name = "ticketstorm"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Durable Objects provide the ONLY safe way to do atomic ticket decrements.
# Without DO, two concurrent requests can both read count=5, both write count=4
# and you lose a ticket. The TicketCounter DO serializes all writes.
[[durable_objects.bindings]]
name = "TICKET_COUNTER"
class_name = "TicketCounter"

[[migrations]]
tag = "v1"
new_classes = ["TicketCounter"]

# KV namespace for sessions, accounts, rate-limit windows, logs.
# Create with: wrangler kv:namespace create TICKETSTORM_KV
[[kv_namespaces]]
binding = "KV"
id = "3a35e54a9bab4a7d9aa6f50447ea3355"

[vars]
ENVIRONMENT = "production"

# Set via: wrangler secret put RESET_SECRET
# [secrets]
# RESET_SECRET

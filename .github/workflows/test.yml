name: Tests

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: worker/package.json
      - run: npm ci
        working-directory: worker
      - run: npm test -- --reporter=verbose --coverage
        working-directory: worker
